name: GetOudio
options:
  minimumXcodeGenVersion: 2.42.0
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true
  postGenCommand: |
    # Fix AppIcon.icon lastKnownFileType from folder to folder.iconcomposer.icon
    # This is needed because XcodeGen doesn't support Icon Composer file type directly
    PBXPROJ="GetOudio.xcodeproj/project.pbxproj"
    if [ -f "$PBXPROJ" ]; then
      sed -i '' 's/lastKnownFileType = folder; name = AppIcon.icon; path = GetOudio\/Resources\/AppIcon.icon/lastKnownFileType = folder.iconcomposer.icon; name = AppIcon.icon; path = GetOudio\/Resources\/AppIcon.icon/g' "$PBXPROJ"
    fi
settings:
  base:
    CLANG_ANALYZER_NONNULL: YES
    CLANG_ANALYZER_LOCALIZABILITY_NONLOCALIZED: YES
    SWIFT_VERSION: 5.0
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: ZWNUJ64F36
    CODE_SIGN_STYLE: Automatic
configs:
  Debug: debug
  Release: release
targets:
  GetOudioCore:
    type: framework
    platform: macOS
    sources:
      - path: GetOudioCore/Sources
    info:
      path: GetOudioCore/Info.plist
      properties:
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shengjiacheng.GetOudioCore
        PRODUCT_NAME: GetOudioCore

  GetOudio:
    type: application
    platform: macOS
    sources:
      - path: GetOudio/App
      - path: GetOudio/Models
      - path: GetOudio/Views
      - path: GetOudio/Resources/AppIcon.icon
        type: folder
        buildPhase: resources
      - path: GetOudio/Resources/NCMFileIcon.icns
        buildPhase: resources
      - path: GetOudio/Resources/Fonts
        type: folder
        buildPhase: resources
      - path: GetOudio/Resources/Documentation
        type: folder
        buildPhase: resources
      - path: GetOudio/Resources/ThirdParty/ffmpeg
        type: folder
        buildPhase: resources
      - path: GetOudio/Resources/ThirdParty/ncmdump
        type: folder
        buildPhase: resources
      - path: GetOudio/Resources/ThirdParty/apple-music-downloader
        type: folder
        buildPhase: resources
    dependencies:
      - target: GetOudioCore
      - target: GetOudioAMRuntimeAgent
        embed: false
        link: false
      - target: GetOudioFinderExtension
        embed: true
      - target: GetOudioShareExtension
        embed: true
    info:
      path: GetOudio/Info.plist
      properties:
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        LSUIElement: true
        CFBundleIconName: AppIcon
        ATSApplicationFontsPath: Fonts
        NSAppleEventsUsageDescription: Get Oudio 需要重启 Finder，以便新启用的 Finder Sync 菜单拓展生效。
        CFBundleURLTypes:
          - CFBundleURLName: com.shengjiacheng.GetOudio
            CFBundleURLSchemes:
              - getoudio
        CFBundleDocumentTypes:
          - CFBundleTypeName: NCM File
            CFBundleTypeRole: Editor
            CFBundleTypeIconFile: NCMFileIcon.icns
            LSHandlerRank: Owner
            LSItemContentTypes:
              - com.shengjiacheng.getoudio.ncm
          - CFBundleTypeName: Audio File
            CFBundleTypeRole: Viewer
            LSHandlerRank: Alternate
            CFBundleTypeExtensions:
              - m4a
              - aac
              - mp3
              - alac
              - flac
              - wav
              - aiff
              - aif
              - ogg
              - opus
              - caf
            LSItemContentTypes:
              - public.audio
        UTExportedTypeDeclarations:
          - UTTypeIdentifier: com.shengjiacheng.getoudio.ncm
            UTTypeDescription: NCM File
            UTTypeIconFile: NCMFileIcon.icns
            UTTypeConformsTo:
              - public.data
            UTTypeTagSpecification:
              public.filename-extension:
                - ncm
    entitlements:
      path: GetOudio/GetOudio.entitlements
      properties:
        com.apple.security.app-sandbox: true
        com.apple.security.automation.apple-events: true
        com.apple.security.temporary-exception.apple-events:
          - com.apple.finder
        com.apple.security.files.user-selected.read-write: true
        com.apple.security.files.bookmarks.app-scope: true
        com.apple.security.files.desktop.read-write: true
        com.apple.security.files.documents.read-write: true
        com.apple.security.files.downloads.read-write: true
        com.apple.security.files.movies.read-write: true
        com.apple.security.files.music.read-write: true
        com.apple.security.files.pictures.read-write: true
        com.apple.security.network.client: true
        com.apple.security.network.server: true
        com.apple.security.application-groups:
          - group.com.shengjiacheng.GetOudio
    settings:
      base:
        ASSETCATALOG_COMPILER_STANDALONE_ICON_BEHAVIOR: default
        ASSETCATALOG_COMPILER_SKIP_APP_STORE_DEPLOYMENT: YES
        ENABLE_APP_SANDBOX: YES
        PRODUCT_BUNDLE_IDENTIFIER: com.shengjiacheng.GetOudio
        PRODUCT_NAME: Get Oudio
    postBuildScripts:
      - name: Copy Apple Music Runtime Agent
        inputFiles:
          - "$(BUILT_PRODUCTS_DIR)/GetOudioAMRuntimeAgent.app/Contents/MacOS/GetOudioAMRuntimeAgent"
        outputFiles:
          - "$(TARGET_BUILD_DIR)/$(CONTENTS_FOLDER_PATH)/Library/LoginItems/GetOudioAMRuntimeAgent.app/Contents/MacOS/GetOudioAMRuntimeAgent"
        script: |
          set -euo pipefail
          AGENT_APP="$BUILT_PRODUCTS_DIR/GetOudioAMRuntimeAgent.app"
          DEST="$TARGET_BUILD_DIR/$CONTENTS_FOLDER_PATH/Library/LoginItems"
          LEGACY_DEST="$TARGET_BUILD_DIR/$CONTENTS_FOLDER_PATH/Helpers"
          mkdir -p "$DEST"
          if [ ! -d "$AGENT_APP" ]; then
            echo "missing Apple Music Runtime Agent app at $AGENT_APP" >&2
            exit 1
          fi
          rm -rf "$LEGACY_DEST/GetOudioAMRuntimeAgent.app"
          rm -rf "$DEST/GetOudioAMRuntimeAgent.app"
          cp -R "$AGENT_APP" "$DEST/GetOudioAMRuntimeAgent.app"

  GetOudioAMRuntimeAgent:
    type: application
    platform: macOS
    sources:
      - path: GetOudioAMRuntimeAgent/Sources
    dependencies:
      - target: GetOudioCore
    info:
      path: GetOudioAMRuntimeAgent/Info.plist
      properties:
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        LSUIElement: true
        CFBundleDisplayName: Get Oudio Apple Music Runtime Agent
    entitlements:
      path: GetOudioAMRuntimeAgent/GetOudioAMRuntimeAgent.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.shengjiacheng.GetOudio
        com.apple.security.network.client: true
        com.apple.security.network.server: true
        com.apple.security.virtualization: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shengjiacheng.GetOudio.AMRuntimeAgent
        PRODUCT_NAME: GetOudioAMRuntimeAgent

  GetOudioFinderExtension:
    type: app-extension
    platform: macOS
    sources:
      - path: GetOudioFinderExtension/Sources
      - path: GetOudioFinderExtension/Resources
    dependencies:
      - target: GetOudioCore
    info:
      path: GetOudioFinderExtension/Info.plist
      properties:
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        CFBundleDisplayName: Get Oudio Finder Extension
        NSExtension:
          NSExtensionAttributes: {}
          NSExtensionPointIdentifier: com.apple.FinderSync
          NSExtensionPrincipalClass: $(PRODUCT_MODULE_NAME).FinderSync
    entitlements:
      path: GetOudioFinderExtension/GetOudioFinderExtension.entitlements
      properties:
        com.apple.security.app-sandbox: true
        com.apple.security.files.user-selected.read-write: true
        com.apple.security.files.bookmarks.app-scope: true
        com.apple.security.application-groups:
          - group.com.shengjiacheng.GetOudio
    settings:
      base:
        ENABLE_APP_SANDBOX: YES
        PRODUCT_BUNDLE_IDENTIFIER: com.shengjiacheng.GetOudio.FinderExtension
        PRODUCT_NAME: GetOudioFinderExtension

  GetOudioShareExtension:
    type: app-extension
    platform: macOS
    sources:
      - path: GetOudioShareExtension/Sources
      - path: GetOudioShareExtension/Resources
    dependencies:
      - target: GetOudioCore
    info:
      path: GetOudioShareExtension/Info.plist
      properties:
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        CFBundleDisplayName: Get Oudio
        CFBundleIconFile: icon
        NSExtension:
          NSExtensionAttributes:
            NSExtensionActivationRule:
              NSExtensionActivationDictionaryVersion: 2
              NSExtensionActivationSupportsAttachmentsWithMaxCount: 999
              NSExtensionActivationSupportsFileWithMaxCount: 999
              NSExtensionActivationSupportsImageWithMaxCount: 999
              NSExtensionActivationSupportsMovieWithMaxCount: 999
              NSExtensionActivationSupportsText: true
              NSExtensionActivationSupportsWebURLWithMaxCount: 1
          NSExtensionPointIdentifier: com.apple.share-services
          NSExtensionPrincipalClass: $(PRODUCT_MODULE_NAME).ShareExtension
    entitlements:
      path: GetOudioShareExtension/GetOudioShareExtension.entitlements
      properties:
        com.apple.security.app-sandbox: true
        com.apple.security.files.bookmarks.app-scope: true
        com.apple.security.application-groups:
          - group.com.shengjiacheng.GetOudio
    settings:
      base:
        ENABLE_APP_SANDBOX: YES
        ENABLE_HARDENED_RUNTIME: YES
        PRODUCT_BUNDLE_IDENTIFIER: com.shengjiacheng.GetOudio.ShareExtension
        PRODUCT_NAME: GetOudioShareExtension

  GetOudioCoreTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: GetOudioCore/Tests
    dependencies:
      - target: GetOudioCore
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: com.shengjiacheng.GetOudioCoreTests

schemes:
  GetOudioCoreTests:
    build:
      targets:
        GetOudioCore: all
        GetOudioCoreTests: all
    test:
      config: Debug
      targets:
        - GetOudioCoreTests

  GetOudio:
    build:
      targets:
        GetOudio: all
        GetOudioCore: all
        GetOudioAMRuntimeAgent: all
        GetOudioFinderExtension: all
        GetOudioShareExtension: all
    run:
      config: Debug
      executable: GetOudio
    test:
      config: Debug
      targets:
        - GetOudioCoreTests
